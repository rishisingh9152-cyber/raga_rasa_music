services:
  - type: web
    name: raga-rasa-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    envVars:
      - key: MONGODB_URL
        value: mongodb+srv://Rishi123:Rishi_123@majorproject.lpwzhzc.mongodb.net/?appName=MajorProject
      - key: DATABASE_NAME
        value: raga_rasa
      - key: EMOTION_SERVICE_URL
        value: https://raga-rasa-music.onrender.com
      - key: EMOTION_SERVICE_ENDPOINT
        value: /detect
      - key: USE_EXTERNAL_EMOTION_SERVICE
        value: "true"
