services:
  - type: web
    name: raga-rasa-backend
    env: python
    plan: free
    runtime: python-3.10.13
    buildCommand: pip install -r Backend/requirements.txt
    startCommand: cd Backend && gunicorn --workers 3 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT main:app
    envVars:
      - key: PORT
        value: 8000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
